services:
  db:
    image: mysql:8.4
    environment:
      MYSQL_DATABASE: devfocus
      MYSQL_USER: devfocus
      MYSQL_PASSWORD: ${DB_PASSWORD:-devfocus-local}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-root-local}
    volumes:
      - mysql-data:/var/lib/mysql
      - ./P2_코드/backend/config/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
      - ./P2_코드/backend/config/schema_p2_p3.sql:/docker-entrypoint-initdb.d/02-p2-p3.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 3s
      retries: 20
  backend:
    build: ./P2_코드/backend
    environment:
      NODE_ENV: production
      PORT: 3001
      FRONTEND_URL: http://localhost:3000
      DB_HOST: db
      DB_USER: devfocus
      DB_PASSWORD: ${DB_PASSWORD:-devfocus-local}
      DB_NAME: devfocus
      JWT_SECRET: ${JWT_SECRET:-local-development-secret-change-before-deploy}
      WEBHOOK_SECRET: ${WEBHOOK_SECRET:-local-webhook-secret}
      TOSS_SECRET_KEY: ${TOSS_SECRET_KEY:-}
      ALLOW_MOCK_PAYMENT: ${ALLOW_MOCK_PAYMENT:-false}
    depends_on:
      db:
        condition: service_healthy
    ports: ["3001:3001"]
  frontend:
    build:
      context: ./P2_코드/frontend
      args:
        NEXT_PUBLIC_API_URL: http://localhost:3001/api
        NEXT_PUBLIC_TOSS_CLIENT_KEY: ${NEXT_PUBLIC_TOSS_CLIENT_KEY:-}
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:3001/api
      NEXT_PUBLIC_TOSS_CLIENT_KEY: ${NEXT_PUBLIC_TOSS_CLIENT_KEY:-}
    depends_on: [backend]
    ports: ["3000:3000"]
volumes:
  mysql-data:
