services:
  db:
    image: mysql:8.4
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: devfocus
      MYSQL_USER: devfocus
      MYSQL_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:?DB_ROOT_PASSWORD is required}
    volumes:
      - mysql-data:/var/lib/mysql
      - ./P2_코드/backend/config/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
      - ./P2_코드/backend/config/schema_p2_p3.sql:/docker-entrypoint-initdb.d/02-p2-p3.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -uroot -p$$MYSQL_ROOT_PASSWORD --silent"]
      interval: 10s
      timeout: 5s
      retries: 20
    networks: [internal]

  backend:
    build: ./P2_코드/backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3001
      FRONTEND_URL: ${FRONTEND_URL:?FRONTEND_URL is required}
      DB_HOST: db
      DB_PORT: 3306
      DB_USER: devfocus
      DB_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
      DB_NAME: devfocus
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      WEBHOOK_SECRET: ${WEBHOOK_SECRET:?WEBHOOK_SECRET is required}
      TOSS_SECRET_KEY: ${TOSS_SECRET_KEY:-}
      ALLOW_MOCK_PAYMENT: "false"
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_SECURE: ${SMTP_SECURE:-false}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      MAIL_FROM: ${MAIL_FROM:-DevFocus <noreply@example.com>}
      DISCORD_WEBHOOK_URL: ${DISCORD_WEBHOOK_URL:-}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      DISABLE_SCHEDULER: ${DISABLE_SCHEDULER:-false}
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "3001:3001"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks: [internal]

volumes:
  mysql-data:

networks:
  internal:
