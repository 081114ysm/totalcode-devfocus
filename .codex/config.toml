# Project-scoped Codex configuration. Loaded only after the repository is trusted.
approval_policy = "on-request"
sandbox_mode = "workspace-write"
project_doc_fallback_filenames = ["CODEX.md"]
project_doc_max_bytes = 65536

developer_instructions = """
Use AGENTS.md for developer, debugger, and reviewer responsibilities.
Consult .codex/rules/frontend.md for browser work, .codex/rules/fullstack.md for
cross-layer work, and .codex/rules/security.md for security-sensitive changes.
The workflow templates are in .codex/commands/.
Use P2_문서 as the product, API, role, and schema specification. The frontend is
P2_코드/frontend and the backend is P2_코드/backend; both use npm independently.
Before completion, run .codex/hooks/verify.sh. Never claim a command passed unless
it was run, and report missing snapshot files separately from implementation bugs.
"""

[agents]
max_threads = 4
max_depth = 1
job_max_runtime_seconds = 1800

[features]
hooks = true
